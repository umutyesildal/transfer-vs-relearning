dataset:
  version: synthetic_v1
  dataset_dir: artifacts/datasets/synthetic_v1
  dataset_manifest: artifacts/datasets/synthetic_v1/manifest.json
  train_file: artifacts/datasets/synthetic_v1/output/english_training.jsonl
  text_field: text
  validation_fraction: 0.02
  split_seed: 42
model:
  base_model_manifest: artifacts/models/openai-community__gpt2/model_manifest.json
training:
  run_name: m1_gpt2_english_facts_lr5e-5_ep3
  output_root: runs/training/m1_gpt2_english_facts
  block_size: 512
  learning_rate: 5.0e-5
  num_train_epochs: 3.0
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: cosine
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  logging_steps: 10
  checkpoint_fractions: [0.25, 0.5, 0.75, 1.0]
  save_total_limit: 8
  seed: 42
runtime:
  local_files_only: true
  world_size: 1

