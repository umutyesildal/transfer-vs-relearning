dataset:
  version: relation_v2_gate_v1_city_hard_negative
  dataset_dir: artifacts/datasets/relation_v2_gate_v1
  dataset_manifest: artifacts/datasets/relation_v2_gate_v1/manifest.json
  training_jsonl: artifacts/datasets/relation_v2_gate_v1/acquisition_10_subjects_direct/train.jsonl
  include_direct_probes: false
  include_qa_train: false
  relations: [born_in, lives_in]
  negative_strategy: paired_city
  negatives_per_example: 1
  validation_fraction: 0.0
  split_seed: 42

model:
  base_model_manifest: runs/local_model_manifests/m1_relation_v2_10_direct_job391106/checkpoint-125_model_manifest.json

training:
  run_name: m1_smollm2_360m_relation_v2_city_hard_negative_cp125_lr5e-6_ep1
  output_root: runs/training/m1_smollm2_360m_relation_v2_city_hard_negative_cp125
  learning_rate: 5.0e-6
  num_train_epochs: 1.0
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: constant_with_warmup
  score_mode: mean_logprob
  answer_separator: " "
  bf16: true
  fp16: false
  gradient_checkpointing: false
  max_grad_norm: 1.0
  logging_steps: 5
  checkpoint_fractions: [0.1, 0.25, 0.5, 0.75, 1.0]
  save_total_limit: 12
  seed: 42

runtime:
  local_files_only: true
  world_size: 1
