dataset:
  version: relation_v2_gate_v1_100_subjects_500_facts_direct
  dataset_dir: artifacts/datasets/relation_v2_gate_v1
  dataset_manifest: artifacts/datasets/relation_v2_gate_v1/manifest.json
  train_file: artifacts/datasets/relation_v2_gate_v1/acquisition_100_subjects_direct/train.jsonl
  validation_file: artifacts/datasets/relation_v2_gate_v1/acquisition_100_subjects_direct/validation.jsonl
  text_field: text
  answer_field: answer
  split_seed: 42

model:
  base_model_manifest: artifacts/models/HuggingFaceTB__SmolLM2-1.7B/model_manifest.json

training:
  run_name: m1_smollm2_1_7b_relation_v2_100_subjects_500_facts_direct_lr1e-4_ep36_seed43
  output_root: runs/training/m1_smollm2_1_7b_relation_v2_100_subjects_500_facts_direct_seed43
  block_size: 128
  learning_rate: 1.0e-4
  num_train_epochs: 36.0
  per_device_train_batch_size: 10
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 50
  warmup_ratio: 0.02
  weight_decay: 0.0
  lr_scheduler_type: constant_with_warmup
  loss_mode: answer_only
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 1.0
  logging_steps: 5
  checkpoint_fractions: [0.1, 0.25, 0.5, 0.75, 1.0]
  save_total_limit: 12
  seed: 43

runtime:
  local_files_only: true
  world_size: 1
