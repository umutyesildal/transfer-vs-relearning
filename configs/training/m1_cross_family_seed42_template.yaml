dataset:
  version: m1_canonical_form_diversity_v1
  dataset_dir: __MATERIALIZED_ON_SCRATCH__
  dataset_manifest: __MATERIALIZED_ON_SCRATCH__
  train_file: __MATERIALIZED_ON_SCRATCH__
  validation_file: __MATERIALIZED_ON_SCRATCH__
  text_field: text
  answer_field: answer
  split_seed: 42

model:
  base_model_manifest: __MATERIALIZED_ON_SCRATCH__

training:
  run_name: __MATERIALIZED_PER_CANDIDATE__
  output_root: __MATERIALIZED_ON_SCRATCH__
  block_size: 128
  learning_rate: 5.0e-5
  num_train_epochs: 36.0
  per_device_train_batch_size: 10
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 50
  warmup_ratio: 0.02
  weight_decay: 0.0
  lr_scheduler_type: constant_with_warmup
  loss_mode: answer_only
  supervise_eos: false
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 1.0
  logging_steps: 5
  checkpoint_fractions: [0.1, 0.25, 0.5, 0.75, 1.0]
  save_total_limit: 12
  seed: 42
  data_seed: 42

runtime:
  local_files_only: true
  world_size: 1
